name: Update Competition List
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly grant write access
    steps:
      - uses: actions/checkout@v4 # Updated to v4 (Node 24 compatible)
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install feedparser
        
      - name: Run Aggregator
        run: python aggregator.py
        
      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update" && git push)