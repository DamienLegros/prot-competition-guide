name: Update Competition List
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4
        
      - name: Run Aggregator
        run: python aggregator.py
        
      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add both the HTML and the new JSON database
          git add index.html competitions_db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update with expanded keywords and DB" && git push)