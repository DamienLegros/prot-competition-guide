name: Global Proteomics Update

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for future compatibility

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5  # Updated to v5 for Node.js 24 support
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Updated to latest stable Python
      
      - name: Install Scrapers
        run: pip install feedparser requests beautifulsoup4 lxml
      
      - name: Update Database
        run: python aggregator.py
      
      - name: Deploy Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'Proteomics-Bot'
          git config --global user.email 'bot@proteomics.ai'
          git add index.html competitions_db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-curated new protein design opportunities" && git push)